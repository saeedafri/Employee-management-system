name: Timesheet Submit Reminders

# SCHEDULE DISABLED 2026-06-19 — the M7 submit-reminder job now runs on the Hostinger VPS
# via the systemd timer `ems-reminder.timer` (every 12h), against the self-hosted Postgres.
# This workflow is kept for manual runs only (workflow_dispatch). Re-enable the `schedule:`
# block below only if you move reminders back to GitHub Actions.
#
# The job gates per tenant on submitReminderDay + the tenant's local timezone (most tenants
# are a no-op on any given day) and is idempotent (a DB unique index prevents duplicate
# reminders for the same week).

on:
  # schedule:
  #   - cron: "0 2 * * *" # daily at 02:00 UTC (DISABLED — moved to VPS systemd timer)
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the submitReminderDay day-of-week gate (fire now, for testing)"
        type: boolean
        default: false

concurrency:
  group: timesheet-reminders
  cancel-in-progress: false

jobs:
  reminders:
    name: Send timesheet submit reminders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run submit-reminder job
        env:
          DATABASE_URL: ${{ secrets.TIMESHEET_DB_URL }}
        run: node src/jobs/submitReminderJob.js ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
