name: Timesheet Submit Reminders

# Free scheduler (GitHub Actions) for the M7 submit-reminder job — no Render Cron needed.
# Runs once a day; the job itself gates per tenant on submitReminderDay + the tenant's
# local timezone, so most tenants are a no-op on any given day. Idempotent (a DB unique
# index means a user can never get two reminders for the same week).

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore the submitReminderDay day-of-week gate (fire now, for testing)"
        type: boolean
        default: false

concurrency:
  group: timesheet-reminders
  cancel-in-progress: false

jobs:
  reminders:
    name: Send timesheet submit reminders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run submit-reminder job
        env:
          DATABASE_URL: ${{ secrets.TIMESHEET_DB_URL }}
        run: node src/jobs/submitReminderJob.js ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}
