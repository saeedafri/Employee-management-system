name: Tests & Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: employee-management-test
        options: >-
          --health-cmd="mysqladmin ping -uroot -ptestroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: npm run db:migrate:dev
        env:
          DATABASE_URL: mysql://root:testroot@127.0.0.1:3306/employee-management-test
          NODE_ENV: test

      - name: Run linting
        run: npm run lint

      - name: Run unit and integration tests
        run: npm test
        env:
          DATABASE_URL: mysql://root:testroot@127.0.0.1:3306/employee-management-test
          REDIS_URL: redis://127.0.0.1:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-cd

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          DATABASE_URL: mysql://root:testroot@127.0.0.1:3306/employee-management-test
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Performance baseline check
        run: npm run test:performance
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: mysql://root:testroot@127.0.0.1:3306/employee-management-test
          REDIS_URL: redis://127.0.0.1:6379
          NODE_ENV: test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Dependency check
        uses: dependabot/fetch-metadata@v1
        if: github.event_name == 'pull_request'
